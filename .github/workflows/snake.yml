name: Generate Snake

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: vertexvisionart
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#57606a&color_dots=#ffffff,#d0d7de,#afb8c1,#8c959f,#57606a
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#6e7681&color_dots=#0d1117,#21262d,#30363d,#484f58,#6e7681
            dist/github-contribution-grid-snake.gif?color_snake=#6e7681&color_dots=#0d1117,#21262d,#30363d,#484f58,#6e7681

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
