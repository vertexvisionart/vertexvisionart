name: Generate Snake

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: vertexvisionart
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#1f2328&color_dots=#ffffff,#d0d7de,#8c959f,#57606a,#1f2328
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#e6edf3&color_dots=#0d1117,#21262d,#484f58,#8b949e,#e6edf3
            dist/github-contribution-grid-snake.gif?color_snake=#e6edf3&color_dots=#0d1117,#21262d,#484f58,#8b949e,#e6edf3

      - name: Strip stack-line bar and trim viewBox
        run: |
          mkdir -p clean
          for f in github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg; do
            sed -e 's#<rect class="u u0"[^/]*/>##g' \
                -e 's#viewBox="-16 -32 880 192"#viewBox="-16 -10 880 130"#g' \
                -e 's#height="192"#height="130"#g' \
                "dist/$f" > "clean/$f"
            echo "cleaned: $f"
          done
          cp dist/github-contribution-grid-snake.gif clean/
          ls -la clean/

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
