name: Generate Snake

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: vertexvisionart
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#1f2328&color_dots=#ffffff,#d0d7de,#8c959f,#57606a,#1f2328
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#e6edf3&color_dots=#0d1117,#21262d,#484f58,#8b949e,#e6edf3
            dist/github-contribution-grid-snake.gif?color_snake=#e6edf3&color_dots=#0d1117,#21262d,#484f58,#8b949e,#e6edf3

      - name: Strip stack-line bar
        run: |
          sudo chmod -R u+w dist
          for f in dist/github-contribution-grid-snake.svg dist/github-contribution-grid-snake-dark.svg; do
            sed -i 's#<rect class="u u0"[^/]*/>##g' "$f"
            echo "stripped: $f"
          done

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
